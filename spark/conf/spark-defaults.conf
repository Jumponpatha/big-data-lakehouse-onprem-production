# Spark Core
spark.master=spark://spark-master:7077
spark.eventLog.enabled=true
spark.eventLog.dir=file:/opt/spark/logs
spark.history.fs.logDirectory=file:/opt/spark/logs
spark.ui.enabled=true
spark.ui.port=4040
spark.ui.showConsoleProgress=true
spark.serializer=org.apache.spark.serializer.KryoSerializer
spark.kryoserializer.buffer=128m
spark.kryoserializer.buffer.max=1g
spark.kryo.registrationRequired=false

# Spark Adaptive Query
spark.sql.adaptive.enabled=true
spark.sql.adaptive.coalescePartitions.enabled=true

# Spark Resources
spark.executor.memory=2g
spark.executor.cores=2
spark.executor.instances=3
spark.driver.memory=2g
spark.dynamicAllocation.enabled=true
spark.dynamicAllocation.minExecutors=1
spark.dynamicAllocation.initialExecutors=1
spark.dynamicAllocation.maxExecutors=10
spark.shuffle.service.enabled=true

# Hive Metastore
spark.sql.catalogImplementation=hive
spark.sql.hive.convertMetastoreParquet=true
spark.hadoop.hive.metastore.uris=thrift://hive-metastore:9083

# Default Warehouse
spark.sql.warehouse.dir=s3a://lakehouse-prod-bucket/warehouse/
spark.hadoop.hive.metastore.warehouse.dir=s3a://lakehouse-prod-bucket/warehouse/

# S3A (MinIO)
spark.hadoop.fs.s3a.endpoint=http://minio:9000
spark.hadoop.fs.s3a.access.key=${AWS_S3_ACCESS_KEY_ID}
spark.hadoop.fs.s3a.secret.key=${AWS_S3_SECRET_ACCESS_KEY}
spark.hadoop.fs.s3a.path.style.access=true
spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.maximum=200
spark.hadoop.fs.s3a.threads.max=200
spark.hadoop.fs.s3a.fast.upload=true
spark.hadoop.fs.s3a.multipart.size=128M
spark.hadoop.fs.s3a.connection.ssl.enabled=false

# ICEBERG (IMPORTANT)
# REQUIRED for MERGE / DELETE / UPDATE
spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.lakehouse_prod=org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.lakehouse_prod.type=hive
spark.sql.catalog.lakehouse_prod.uri=thrift://hive-metastore:9083
spark.sql.catalog.lakehouse_prod.warehouse=s3a://lakehouse-prod-bucket/warehouse/
spark.sql.catalog.lakehouse_prod.io-impl=org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.lakehouse_prod.s3.endpoint=http://minio:9000
spark.sql.catalog.lakehouse_prod.s3.path-style-access=true
spark.sql.catalog.lakehouse_prod.s3.access-key-id=${AWS_S3_ACCESS_KEY_ID}
spark.sql.catalog.lakehouse_prod.s3.secret-access-key=${AWS_S3_SECRET_ACCESS_KEY}
spark.sql.catalog.lakehouse_prod.s3.region=us-east-1