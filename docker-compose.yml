    container_name: minio-client
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/s3-entrypoint.sh"]
    volumes:
      - ./minio/scripts/s3-entrypoint.sh:/s3-entrypoint.sh

    networks:
      - lakehouse_prod_net

